<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeConversive - Anonymous Confessions</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-gradient"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="logo">BeConversive</h1>
            <p class="tagline">Share your truth, anonymously</p>
        </header>

        <main class="main-content">
            <div class="confession-card">
                <div class="card-header">
                    <h2>Your Confession</h2>
                    <p class="subtitle">What's on your mind? Share it with the world.</p>
                </div>

                <form id="confessionForm" class="confession-form">
                    <div class="form-group">
                        <textarea 
                            id="confessionText" 
                            name="text" 
                            placeholder="Type your confession here..."
                            maxlength="{{ max_length }}"
                            required
                        ></textarea>
                        <div class="character-count">
                            <span id="charCount">0</span> / {{ max_length }}
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span class="btn-text">Post Confession</span>
                            <span class="btn-loader" style="display: none;">
                                <svg class="spinner" viewBox="0 0 50 50">
                                    <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                                </svg>
                            </span>
                        </button>
                    </div>

                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                    <div id="successMessage" class="success-message" style="display: none;"></div>
                </form>

                <div class="info-section">
                    <div class="info-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
                            <path d="M12 1v6m0 0a3 3 0 100 6 3 3 0 000-6z"></path>
                        </svg>
                        <span>100% Anonymous</span>
                    </div>
                    <div class="info-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Instantly Posted Once Approved by AI</span>
                    </div>
                    <div class="info-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                        <span>Safe & Moderated</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 BeConversive. All confessions are anonymous.</p>
            <p class="instagram-link">
                Confessions are posted on
                <a href="https://www.instagram.com/beconversive/" target="_blank" rel="noopener noreferrer">@beconversive</a>
            </p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>

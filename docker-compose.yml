version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./generated_images:/app/generated_images
      - ./backgrounds:/app/backgrounds
      - ./confessions.db:/app/confessions.db
    env_file:
      - .env
    restart: unless-stopped
    
